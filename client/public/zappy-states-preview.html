<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zappy States</title>
<style>
  body { margin: 0; background: #F5F1EA; font-family: 'Arial', sans-serif; padding: 32px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  .card { background: #FFFFFF; border-radius: 24px; padding: 24px 16px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .card img { width: 160px; height: 200px; object-fit: contain; }
  .label { margin-top: 12px; font-size: 13px; font-weight: 700; color: #FF5B1D; text-transform: uppercase; letter-spacing: 0.08em; }
  .sublabel { font-size: 11px; color: #8B5CF6; margin-top: 4px; }
  h1 { text-align: center; color: #1a1a1a; font-size: 22px; margin-bottom: 28px; }
</style>
</head>
<body>
  <h1>Zappy Mascot — Four Emotional States</h1>
  <div class="grid">
    <div class="card">
      <img src="/zappy-working.svg" alt="Working">
      <div class="label">Working</div>
      <div class="sublabel">state="loading"</div>
    </div>
    <div class="card">
      <img src="/zappy-cheering.svg" alt="Cheering">
      <div class="label">Cheering</div>
      <div class="sublabel">state="cheering"</div>
    </div>
    <div class="card">
      <img src="/zappy-concerned.svg" alt="Concerned">
      <div class="label">Concerned</div>
      <div class="sublabel">state="concerned"</div>
    </div>
    <div class="card">
      <img src="/zappy-waiting.svg" alt="Waiting">
      <div class="label">Waiting</div>
      <div class="sublabel">state="waiting"</div>
    </div>
  </div>
</body>
</html>
